capability: manifests-usps-scan
title: Sendle Manifests - USPS SCAN Forms
description: Create, list, download, and inspect USPS SCAN Form shipping manifests for US domestic orders.
provider: sendle
api: sendle-manifests-api
operations:
  - id: createShippingManifest
    summary: Create one or more USPS SCAN Form manifests for booked orders
    method: POST
    path: /manifests
    spec: openapi/sendle-manifests-api-openapi.yml
  - id: getShippingManifests
    summary: List all shipping manifests on the account
    method: GET
    path: /manifests
    spec: openapi/sendle-manifests-api-openapi.yml
  - id: downloadShippingManifest
    summary: Download the printable PDF manifest
    method: GET
    path: /manifests/{id}/download
    spec: openapi/sendle-manifests-api-openapi.yml
  - id: getShippingManifestOrders
    summary: List all orders on a manifest
    method: GET
    path: /manifests/{id}/orders
    spec: openapi/sendle-manifests-api-openapi.yml
  - id: getShippingManifestStatus
    summary: Get status and metadata for a manifest
    method: GET
    path: /manifests/{id}/status
    spec: openapi/sendle-manifests-api-openapi.yml
constraints:
  region: US Domestic only
  carrier_scope: USPS labels
  same_day: Orders must be created the same day as the manifest
  immutability: Manifests cannot be modified after creation

capability: orders-shipping
title: Sendle Orders - Shipping Lifecycle
description: Quote, create, view, cancel, and return parcels via Sendle.
provider: sendle
api: sendle-orders-api
operations:
  - id: getProducts
    summary: Get serviceable shipping products and quotes for a route
    method: GET
    path: /products
    spec: openapi/sendle-products-api-openapi.yml
  - id: postProducts
    summary: Get serviceable products with full domestic + DDP international support
    method: POST
    path: /products
    spec: openapi/sendle-products-api-openapi.yml
  - id: createOrder
    summary: Book a parcel shipment for pickup or drop-off
    method: POST
    path: /orders
    spec: openapi/sendle-orders-api-openapi.yml
  - id: viewOrder
    summary: Retrieve a booked order including label URLs and tracking URL
    method: GET
    path: /orders/{id}
    spec: openapi/sendle-orders-api-openapi.yml
  - id: cancelOrder
    summary: Cancel an order before driver collection
    method: POST
    path: /orders/{id}/cancel
    spec: openapi/sendle-orders-api-openapi.yml
  - id: returnOrder
    summary: Create a return label for an existing domestic order
    method: POST
    path: /orders/{id}/return
    spec: openapi/sendle-orders-api-openapi.yml
inputs:
  - sender.address
  - receiver.address
  - weight
  - dimensions
  - parcel_contents
outputs:
  - order_id
  - sendle_reference
  - tracking_url
  - labels[].url
  - price
governance:
  authentication: HTTP Basic (Sendle ID + API Key)
  idempotency: Idempotency-Key header on POST /orders
  rate_limits:
    tracking: 10 requests/second per IP
  data_residency: Currency follows sender country (AUD/CAD/USD)

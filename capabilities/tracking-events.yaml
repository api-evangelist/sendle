capability: tracking-events
title: Sendle Tracking - Polling and Webhooks
description: Track parcels by polling or subscribing to webhooks per Sendle reference.
provider: sendle
api: sendle-tracking-api
operations:
  - id: trackParcel
    summary: Retrieve all tracking events for a parcel
    method: GET
    path: /parcels/{ref}/tracking
    spec: openapi/sendle-tracking-api-openapi.yml
  - id: subscribeToTrackingEvents
    summary: Subscribe a parcel to webhook tracking events
    method: POST
    path: /parcels/{ref}/tracking/subscribe
    spec: openapi/sendle-tracking-api-openapi.yml
  - id: unsubscribeFromTrackingEvents
    summary: Cancel a webhook subscription for a parcel
    method: DELETE
    path: /parcels/{ref}/tracking/subscribe
    spec: openapi/sendle-tracking-api-openapi.yml
events:
  delivery: AsyncAPI webhook
  asyncapi: asyncapi/sendle-tracking-asyncapi.yml
  payload_schema: json-schema/sendle-tracking-event-schema.json
  retry_policy: Up to 3 retries on non-2xx responses
governance:
  authentication: HTTP Basic for REST; partner-defined for webhook callback
  rate_limits:
    polling: 10 requests/second per IP
  callback_configuration: Settings -> API in the Sendle dashboard
